version: '3.8'
services:
  nodejs:
    build: ./backend-node
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bloodbank
      - JWT_SECRET=your-secret
    depends_on:
      - mongo

  golang:
    build: ./bloodbank-go
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bloodbank
      - JWT_SECRET=your-secret
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nodejs
      - golang

volumes:
  mongo-data:
# Ví dụ Nginx failover: Node.js là backend chính, FastAPI là backend phụ.
# Thay example.com bằng domain thật.

upstream blood_bank_backend {
    server 127.0.0.1:5000 max_fails=2 fail_timeout=10s;
    server 127.0.0.1:8000 backup;
}

server {
    listen 80;
    server_name example.com;

    location /api/ {
        proxy_pass http://blood_bank_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass http://blood_bank_backend;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
